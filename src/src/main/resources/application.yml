spring:
  application:
    name: homework-search-service
  profiles:
    active: dev
  cloud:
    config:
      enabled: false
  main:
    allow-bean-definition-overriding: true
    banner-mode: off

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL13Dialect
        format_sql: true
        use_sql_comments: true
    show-sql: false
    open-in-view: false

  # Cache Configuration
  cache:
    type: redis
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms
      database: 0

  # Elasticsearch Configuration
  elasticsearch:
    rest:
      uris: http://localhost:9200

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-stacktrace: on-param
    include-exception: false

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.university.homework: DEBUG
    org.springframework.web: INFO
    org.elasticsearch: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/homework-search-service.log
    max-size: 10MB
    max-history: 30