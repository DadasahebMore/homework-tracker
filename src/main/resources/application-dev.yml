spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  elasticsearch:
    rest:
      uris: http://localhost:9200
  cache:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/homework
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

server:
  port: 8080

logging:
  level:
    root: DEBUG
    org.springframework: DEBUG
    com.university.homework: DEBUG